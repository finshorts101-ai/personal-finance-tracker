<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finance Tracker Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div id="landing-page" class="full-page">
        <div class="welcome-box">
            <h1>Finance Tracker</h1>
            <p>Private. Local. Secure.</p>
            <input type="text" id="user-name-input" placeholder="Enter your name...">
            <button class="btn-primary" onclick="ui.setupProfile()">Start Journey</button>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <nav class="navbar">
            <span class="logo">📒 Finance Tracker</span>
            <div class="tabs">
                <button class="tab-btn active">Bank Accounts</button>
                <button class="tab-btn">Net Worth</button>
                <button class="tab-btn">Expenses</button>
            </div>
            <span id="display-name" class="user-tag"></span>
        </nav>

        <div class="main-layout">
            <div class="left-col">
                <div class="card">
                    <h3>Add/Update Balance</h3>
                    <div class="input-group">
                        <label>Bank Name</label>
                        <input type="text" id="bankName" placeholder="e.g., HDFC">

                        <label>Balance</label>
                        <input type="number" id="bankBalance" placeholder="0">

                        <label>Date</label>
                        <input type="date" id="entryDate">

                        <button class="btn-primary" onclick="ui.handleSave()">Save Entry</button>
                    </div>
                </div>

                <h3>Your Accounts</h3>
                <div id="account-grid" class="account-grid"></div>
                <button onclick="ui.clearAllData()" style="background: none; border: 1px solid #ef4444; color: #ef4444; margin-top: 20px; font-size: 0.8rem; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%;">
        Clear All Data & History
                </button>
            </div>

            <div class="right-col">
                <div class="card chart-card">
                    <h3>Balance Trend</h3>
                    <canvas id="mainChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
